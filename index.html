<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASH-CALCULATOR.</title>

    <style>
        body {
            background-color: lightblue;
            text-align: center;
        }

        hr {
            border: 1px solid blue;
        }
        button {
            color: white;
            background-color:black;

        }
    </style>
    
    <script>
       function calculate() {
          var originalprc =parseFloat(document.getElementById("oprc").value);
          var percentoff =parseFloat(document.getElementById("perc").value);
 
          var discountprc=originalprc*(percentoff/100);
          var finalprc=originalprc-discountprc;

          document.getElementById("fprc").textContent="$"+finalprc.toFixed(2);



       }
    </script>
</head>
<body>
    <hr>

    <h1>Sales Calculator</h1>

    <h2 id="fprc">$00.00</h2>

<p>
    <label for="oprc">Original Price: $</label>
    <input type="text" id="oprc" ><br><br>

    <label for="perc">Percent Off: </label>
    <input type="text" id="perc">%<br><br>

    <button onclick="calculate()">Calculate!</button>
</p>
    <hr>

</body>
</html>
